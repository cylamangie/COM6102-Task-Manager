services:
  local-db:
    image: postgres:18-alpine
    ports:
      - "${LOCAL_DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=taskdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - local_postgres_data:/var/lib/postgresql
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskdb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  local_postgres_data:
